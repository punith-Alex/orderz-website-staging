name: Deploy staging to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Unpack site
        run: |
          mkdir -p _site
          unzip -o dist.zip -d _site
          printf 'User-agent: *\nDisallow: /\n' > _site/robots.txt
      - name: Clarify menu column labels (no-op once baked into dist.zip)
        run: |
          python3 - <<'PY'
          import re, pathlib
          expl = ["POS + QR ordering + kitchen + reports. Everything connected.",
                  "POS + bookings + CRM + commissions. Everything connected.",
                  "POS + scheduling + client records + reports. Everything connected.",
                  "POS + inventory + loyalty + reports. Everything connected."]
          css = pathlib.Path("_site/assets/css/style.css")
          t = css.read_text(encoding="utf-8")
          if "col-expl" not in t:
              css.write_text(t + "\n.col-expl{display:block;font-size:10.5px;color:#8a94a3;line-height:1.45;padding:0 .6rem .45rem;max-width:230px;}\n", encoding="utf-8")
          n = 0
          for f in pathlib.Path("_site").rglob("index.html"):
              h = f.read_text(encoding="utf-8")
              orig = h
              c = [0]
              def left(m):
                  e = expl[c[0]] if c[0] < 4 else ""
                  c[0] += 1
                  return '<span class="col-badge">Complete System</span><span class="col-expl">' + e + '</span>'
              h = re.sub(r'<span class="col-badge">Full Platform 360°</span>', left, h)
              h = h.replace(' — everything connected.', '. Everything connected.')
              h = h.replace('<span class="col-badge">POS Only</span>', '<span class="col-badge">POS</span>')
              h = h.replace('Start with billing only. Add modules anytime.', 'Start with billing. Add modules anytime.')
              if 'Start with billing' not in h:
                  h = h.replace('<span class="col-badge">POS</span>', '<span class="col-badge">POS</span><span class="col-expl">Start with billing. Add modules anytime.</span>')
              if h != orig:
                  f.write_text(h, encoding="utf-8")
                  n += 1
          print("menu labels updated on", n, "pages")
          PY
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
